apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalog-sa
  namespace: movietrack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: catalog-role
  namespace: movietrack
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: catalog-rolebinding
  namespace: movietrack
subjects:
  - kind: ServiceAccount
    name: catalog-sa
    namespace: movietrack
roleRef:
  kind: Role
  name: catalog-role
  apiGroup: rbac.authorization.k8s.io
