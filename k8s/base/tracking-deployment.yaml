apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking
  namespace: movietrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracking
  template:
    metadata:
      labels:
        app: tracking
    spec:
      serviceAccountName: tracking-sa
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.0
          command: ['sh', '-c', 'until mysqladmin ping -h mysql-tracking -u root -p$MYSQL_ROOT_PASSWORD --silent; do echo waiting for mysql-tracking; sleep 2; done']
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-tracking-secret
                  key: MYSQL_ROOT_PASSWORD
      containers:
        - name: tracking
          image: 1yacine/movietrack-tracking:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-tracking-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-tracking-secret
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 5
